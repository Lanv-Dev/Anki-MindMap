<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>

<body>
  <script>
  const mapC = new Map([
    [null, [1, 9]]
    [1, [2, 3]],
    [2, [6, 4]],
    [3, [5, 8, 7]],
    [4, []],
    [5, []],
    [6, []],
    [7, []],
    [8, []],
    [9, []]
  ]);
  const mapF = new Map([
    [1, null],
    [2, 1],
    [3, 1],
    [4, 2],
    [5, 3],
    [6, 2],
    [7, 3],
    [8, 3],
    [9, null]
  ]);
  //Table style
  // Console.log for F, H, W, S, X, Y
  console.table(Array.from(mapF, ([key, value]) => ({ key, value })));
  
  // Console.log for C
  console.table( Array.from(mapC, ([key, value]) => ({ key, value: value.join(', ') })) );
  
  //Normal style
  // Console.log for F, H, W, S, X, Y
  console.log(
  Array.from(mapF, ([key, value]) => `${key} => ${value}`).join(';  ')
  );
  
  // Console.log for C
  console.log(Array.from(mapC, ([key, value]) => `${key} => [${value.join(',')}]`).join(';  '));
  
  // Extrair function
  console.log(addEventListener.toString());
    
  </script>
</body>

</html>
